apiVersion: apps/v1
kind: Deployment
metadata:
  name: journal-db
  labels:
    app.kubernetes.io/name: journal-db
    app.kubernetes.io/instance: journal
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: journal
    app.kubernetes.io/managed-by: manifests
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: journal-db
      app.kubernetes.io/instance: journal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: journal-db
        app.kubernetes.io/instance: journal
        app.kubernetes.io/version: "1.0"
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: journal
        app.kubernetes.io/managed-by: manifests
        environment: production
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: db-data
        emptyDir: {}
      containers:
      - name: database
        image: kalebcastillo/journaldb:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: journal
              key: DB_PASSWORD
